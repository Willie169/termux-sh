name: termux-setup
on:
  workflow_dispatch:
jobs:
  install:
    timeout-minutes: 360
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare
        timeout-minutes: 360
        run: |
          cd ~
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install curl git -y
          source /etc/os-release
          curl --retry 100 --retry-connrefused --retry-delay 5 -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo tee /etc/apt/trusted.gpg.d/docker.asc >/dev/null
          echo "deb [arch=amd64] https://download.docker.com/linux/ubuntu $UBUNTU_CODENAME stable" | sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install docker-ce -y
          git clone https://github.com/Willie169/termux-sh.git
          cd termux-sh
          wget --tries=100 --retry-connrefused --waitretry=5 https://raw.githubusercontent.com/Willie169/termux-android-sdk-ndk/refs/heads/main/install.sh
          sed -i '/#!\/data\/data\/com\.termux\/files\/usr\/bin\/bash/d' install.sh
          sed -Ei '/wget --tries=100 --retry-connrefused --waitretry=5 https:\/\/raw.githubusercontent.com\/Willie169\/termux-android-sdk-ndk\/refs\/heads\/main\/install\.sh/d; /chmod \+x install\.sh/d; s/(PROFILE=\/dev\/null) \.\/install\.sh.*/\1/; /PROFILE=\/dev\/null/r install.sh' termux-setup.sh
          rm install.sh
          sed -Ei 's/^pkg /apt /; s/ pkg / apt /; s/(chmod \+x install\.sh)/\1\nsed -Ei '"'"'s|(#!\/data\/data\/com\\.termux\/files\/usr\/bin\/bash)|\\1\\nset -euxo pipefail|; s|pkg |apt |'"'"' install.sh/; s/(uv sync)/ANDROID_API_LEVEL=24 \1/' termux-setup.sh
          sed -Ei 's/( install [\$PKG|xfce4] -y)/\1 -s/; s/(\.\/ubuntu-debian.sh)/\1 --test/' termux-setup.sh
      - name: Run termux-setup.sh
        timeout-minutes: 360
        run: |
          sudo docker run --rm -v "$HOME/termux-sh:/data/data/com.termux/files/home/termux-sh" -w "/data/data/com.termux/files/home/termux-sh" --privileged termux/termux-docker bash -c '
            set -euxo pipefail
            echo "deb https://packages.termux.dev/apt/termux-main stable main" > /data/data/com.termux/files/usr/etc/apt/sources.list
            ./termux-setup.sh
          '
