name: test

on:
  workflow_dispatch:

jobs:
  working:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: i686
          - runner: ubuntu-24.04
            architecture: x86_64
          - runner: ubuntu-24.04-arm
            architecture: arm
          - runner: ubuntu-24.04-arm
            architecture: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: termux/termux-docker:${{ matrix.architecture }}
    env:
      TERMUX_MAIN_PACKAGE_FORMAT: debian
      ANDROID_ROOT: /system
      ANDROID_DATA: /data
      PREFIX: /data/data/com.termux/files/usr
      HOME: /data/data/com.termux/files/home
      PATH: /data/data/com.termux/files/usr/bin
      TMPDIR: /data/data/com.termux/files/usr/tmp
      LANG: en_US.UTF-8
      TZ: UTC
    steps:
      - name: set pkg command to use the packages-cf.termux.dev mirror
        run: ln -sf ${PREFIX}/etc/termux/mirrors/default ${PREFIX}/etc/termux/chosen_mirrors
      - name: fix executable bit for all binaries in $PREFIX/bin for all users
        run: chmod -R o+x ${PREFIX}/bin
      - name: setup
        run: |
          /entrypoint.sh pkg install git -y
          cd ~ && git clone https://github.com/Willie169/termux-sh.git
      - name: patch script
        run: |
          cd ~/termux-sh
          sed -Ei 's/DEBIANINSTALL=0/DEBIANINSTALL=1/; s/^(pkg|pip|npm)/\/entrypoint.sh \1/; s/\&\& (pkg|pip|npm)/\&\& \/entrypoint.sh \1/; s/\|\| (pkg|pip|npm)/|| \/entrypoint.sh \1/' termux-setup.sh
          cd ~
      - name: main
        run: |
          bash ~/termux-sh/termux-setup.sh
