name: test
on:
  workflow_dispatch:
jobs:
  install:
    timeout-minutes: 360
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare
        timeout-minutes: 360
        run: |
          cd ~
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install curl -y
          source /etc/os-release
          curl --retry 100 --retry-connrefused --retry-delay 5 -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo tee /etc/apt/trusted.gpg.d/docker.asc >/dev/null
          echo "deb [arch=amd64] https://download.docker.com/linux/ubuntu $UBUNTU_CODENAME stable" | sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install docker-ce -y
      - name: Run test
        timeout-minutes: 360
        run: sudo docker run --rm -w "/data/data/com.termux/files/home" --privileged termux/termux-docker bash -c '
          set -x
          date
          pkg --version
          apt --version
          dpkg -l | grep termux-keyring
          cat $PREFIX/etc/apt/sources.list
          for f in $PREFIX/etc/apt/sources.list.d/*; do
          test -f "$f" && echo "$f" && cat "$f"
          done
          ls $PREFIX/etc/apt/trusted.gpg.d
          pkg update
          pkg install termux-keyring x11-repo tur-repo -y
          for f in $PREFIX/etc/apt/sources.list.d/*; do
          test -f "$f" && echo "$f" && cat "$f"
          done
          ls $PREFIX/etc/apt/trusted.gpg.d
        '