name: termux-setup-test

on:
  workflow_dispatch:

jobs:
  working:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            architecture: arm
          - runner: ubuntu-24.04-arm
            architecture: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: termux/termux-docker:${{ matrix.architecture }}
      volumes: 
        - /tmp/node20:/__e/node20
    env:
      TERMUX_MAIN_PACKAGE_FORMAT: debian
      ANDROID_ROOT: /system
      ANDROID_DATA: /data
      PREFIX: /data/data/com.termux/files/usr
      HOME: /data/data/com.termux/files/home
      PATH: /data/data/com.termux/files/usr/bin
      TMPDIR: /data/data/com.termux/files/usr/tmp
      LANG: en_US.UTF-8
      TZ: UTC
    steps:
      - name: Prepare
        run: |
          ln -sf ${PREFIX}/etc/termux/mirrors/default ${PREFIX}/etc/termux/chosen_mirrors
          /entrypoint.sh pkg upgrade -y
          chmod -R o+x ${PREFIX}
          chmod -R o+x ${HOME}
          /entrypoint.sh pkg install nodejs-lts git perl -y
          ln -sf ${PREFIX}/bin /__e/node20/bin
      - name: Checkout
        run: cd ~ && git clone https://github.com/Willie169/termux-sh.git
      - name: Patch script
        run: |
          cd ~/termux-sh
          perl -i -pe '
          s/^DEBIANINSTALL=0/DEBIANINSTALL=1/;
          s/tur-repo -y/-y/;
          s/^( *)(pkg|pip|npm|proot-distro)/$1\/entrypoint.sh $2/;
          s/(\&\&|\|\|) (pkg|pip|npm|proot-distro)/$1 \/entrypoint.sh $2/; 
          s/(\&\&|\|\|) npm i\b(.*)/$1 \/entrypoint.sh npm i$2 --dry-run/;
          s/pkg install (\$PKG|xfce4) -y/pkg install $1 -y --dry-run/' termux-setup.sh
          perl -0777 -i -pe '
          s/wget --tries=100 --retry-connrefused --waitretry=5 https:\/\/mirror\.ctan\.org.*<\/fontconfig>\nEOF\nfc-cache -fv//s;
          ' ubuntu-debian.sh
          perl -i -pe '
          s/^npm i\b(.*)/npm i$1 --dry-run/;
          s/^brew install\b(.*)/brew install$1 --dry-run/;
          s/^deb-get install.*//;
          s/^fc-cache -fv//;
          s/^apt install (dbus-x11 firefox mesa-utils xfce4 xfce4-goodies xfce4-terminal xinit|lazygit|eza|dotnet-sdk-10.0 aspnetcore-runtime-10.0|glow) -y/apt install $1 -y --dry-run/;
          BEGIN { $seen = 0; $count = 0 }
          if (!$seen && /apt upgrade -y/) {
            $seen = 1;
            $count = 2;
          }
          if ($seen && $count > 0) {
            if ($count < 2) {
              s/$/ --dry-run/;
            }
            $count--;
            if ($count == 0) {
                $_ .= "apt install apt-transport-https build-essential ca-certificates cmake curl dbus debian-archive-keyring debian-keyring default-jdk g++ gcc git gpg jq libeigen3-dev libqt5svg5-dev make maven ninja-build perl python-is-python3 python3 qtbase5-dev qtbase5-dev-tools wget -y\n";
            }
          }
          ' ubuntu-debian.sh
      - name: Main
        run: |
          bash ~/termux-sh/termux-setup.sh 2>&1 | tee ~/termux-setup.log
      - name: Upload log file
        uses: actions/upload-artifact@v4.6.0
        with:
          name: termux-setup-${{ matrix.architecture }}.log
          path: ~/termux-setup.log
