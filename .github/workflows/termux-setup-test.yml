name: termux-setup-test
on:
  workflow_dispatch:
jobs:
  termux-setup-test:
    timeout-minutes: 360
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            architecture: arm
          - runner: ubuntu-24.04-arm
            architecture: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare
        timeout-minutes: 360
        run: |
          cd ~
          sudo apt install git perl pipx proot -y
          pipx install proot-distro
          proot-distro install termux/termux-docker --name termux
          git clone https://github.com/Willie169/termux-sh.git
          cd termux-sh
          perl -i -pe 's/^DEBIANINSTALL=0/DEBIANINSTALL=1/;
          s/pkg install (\$PKG|xfce4 -y)/pkg install $1 -s/;
          s/\.\/ubuntu-debian.sh/.\/ubuntu-debian.sh --test/' termux-setup.sh
          cp termux-setup.sh ~/.local/share/proot-distro/containers/termux/rootfs/data/data/com.termux/files/home/
      - name: Main
        timeout-minutes: 360
        run: proot-distro run termux -- ./termux-setup.sh
