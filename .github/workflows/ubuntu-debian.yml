name: ubuntu-debian
on:
  workflow_dispatch:
jobs:
  install:
    timeout-minutes: 360
    strategy:
      matrix:
        image:
          - ubuntu:24.04
          - ubuntu:26.04
          - debian:13
    runs-on: ubuntu-24.04-arm
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout repository
        timeout-minutes: 360
        uses: actions/checkout@v4
      - name: Run ubuntu-debian.sh
        timeout-minutes: 360
        run: ./ubuntu-debian.sh --test
